<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game | Mind Games</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-memory">

    <!-- Loader -->
    <div id="loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <h3>Loading Memory Game...</h3>
            <p>Prepare to test your memory</p>
        </div>
    </div>

    <!-- Brain Neurons Canvas -->
    <canvas id="neuronCanvas" class="bg-canvas"></canvas>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-brain"></i> MIND ARENA
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="memory.html"><i class="fas fa-puzzle-piece"></i> Memory</a></li>
                    <li class="nav-item"><a class="nav-link" href="mindreader.html"><i class="fas fa-magic"></i> Mind Reader</a></li>
                    <li class="nav-item"><a class="nav-link" href="reaction.html"><i class="fas fa-bolt"></i> Reaction</a></li>
                    <li class="nav-item"><a class="nav-link" href="quiz.html"><i class="fas fa-user-circle"></i> Quiz</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Progress Bar -->
    <div class="container mt-3">
        <div class="progress-wrapper">
            <div class="progress">
                <div id="progressBar" class="progress-bar" style="width: 0%">0%</div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="glass-card p-4">
            <h2 class="text-center mb-4">
                <i class="fas fa-brain me-2"></i>Memory Challenge
            </h2>
            <p class="text-center">Watch the sequence carefully, then repeat it!</p>
            
            <div id="sequenceDisplay" class="sequence-display text-center mb-4">???</div>
            
            <div class="text-center">
                <button class="btn btn-custom" onclick="startMemoryGame()">
                    <i class="fas fa-play me-2"></i>Start Game
                </button>
                <a href="index.html" class="btn btn-outline-custom ms-3">
                    <i class="fas fa-home me-2"></i>Back to Menu
                </a>
            </div>
            
            <div id="memoryResult" class="text-center mt-4"></div>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="clickSound" src="click.mp3"></audio>
    <audio id="winSound" src="win.mp3"></audio>
    <audio id="startSound" src="start.mp3"></audio>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
